name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar código
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Criar projeto Flutter temporário
        run: flutter create temp_app

      - name: Copiar arquivos do app
        run: |
          cp pubspec.yaml temp_app/pubspec.yaml
          mkdir -p temp_app/lib
          cp lib/main.dart temp_app/lib/main.dart

      - name: Instalar dependências
        working-directory: temp_app
        run: flutter pub get

      - name: Gerar APK
        working-directory: temp_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
